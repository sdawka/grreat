name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run check

      # astro check is a diagnostics pass only; run the real Vite/adapter build
      # so build-breaking regressions can't merge with green CI.
      - run: npm run build

  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: engine/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      # the deployable artifact is Flue's generated worker; keep it building
      - run: npm run build
